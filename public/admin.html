<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة الإدارة – المواقع المسجلة</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #f4f4f4;
      margin: 20px;
      direction: rtl;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    th, td {
      padding: 12px 15px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }
    th {
      background: #e91e63;
      color: white;
    }
    .error {
      color: red;
      font-weight: bold;
      text-align: center;
    }
    .location-link {
      color: #e91e63;
      text-decoration: none;
    }
    .location-link:hover {
      text-decoration: underline;
    }
    h1 {
      text-align: center;
      color: #333;
    }
  </style>
</head>
<body>
  <h1>📍 المواقع المسجلة</h1>
  <div id="content"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const password = params.get('password');

    if (!password) {
      document.getElementById('content').innerHTML = '<p class="error">الرجاء إضافة ?password=كلمة_المرور إلى الرابط.</p>';
    } else {
      fetch(`/api/locations?password=${encodeURIComponent(password)}`)
        .then(response => {
          if (!response.ok) throw new Error('غير مصرح أو خطأ في الخادم');
          return response.json();
        })
        .then(data => {
          if (data.length === 0) {
            document.getElementById('content').innerHTML = '<p style="text-align:center;">لا توجد مواقع مسجلة بعد.</p>';
            return;
          }

          let tableHTML = `
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>خط العرض</th>
                  <th>خط الطول</th>
                  <th>الدقة (متر)</th>
                  <th>اسم المكان</th>
                  <th>وقت الإدخال</th>
                  <th>عنوان IP</th>
                  <th>الخريطة</th>
                </tr>
              </thead>
              <tbody>
          `;
          data.forEach(entry => {
            const mapsLink = `https://www.google.com/maps?q=${entry.latitude},${entry.longitude}`;
            tableHTML += `
              <tr>
                <td>${entry.id}</td>
                <td>${entry.latitude}</td>
                <td>${entry.longitude}</td>
                <td>${entry.accuracy ? entry.accuracy.toFixed(1) + ' م' : 'غير معروف'}</td>
                <td>${entry.location_name || 'غير معروف'}</td>
                <td>${entry.timestamp}</td>
                <td>${entry.ip_address || 'غير متوفر'}</td>
                <td><a class="location-link" href="${mapsLink}" target="_blank">عرض على الخريطة</a></td>
              </tr>
            `;
          });
          tableHTML += '</tbody></table>';
          document.getElementById('content').innerHTML = tableHTML;
        })
        .catch(error => {
          document.getElementById('content').innerHTML = `<p class="error">خطأ: ${error.message}</p>`;
        });
    }
  </script>
</body>
</html>
